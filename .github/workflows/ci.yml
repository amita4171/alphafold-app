name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Syntax check all modules
        run: |
          python -c "
          import ast
          for f in ['app.py','analysis.py','api_clients.py','viz.py','ui_components.py','export_utils.py']:
              ast.parse(open(f).read())
          print('All syntax OK')
          "

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t alphafold-explorer .

      - name: Verify health endpoint
        run: |
          docker run -d --name test -p 8501:8501 alphafold-explorer
          sleep 10
          curl -f http://localhost:8501/_stcore/health
          docker rm -f test
